name: Build Sultan AI APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Buildozer and Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --user --upgrade buildozer
          pip install --user --upgrade Cython==0.29.33
      - name: Build APK
        run: |
          if [ ! -f buildozer.spec ]; then
            ~/.local/bin/buildozer init
            sed -i 's/package.name = myapp/package.name = sultanai/' buildozer.spec
            sed -i 's/package.domain = org.test/package.domain = org.sultan/' buildozer.spec
            sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          fi
          ~/.local/bin/buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sultan-AI-Real-App
          path: bin/*.apk
